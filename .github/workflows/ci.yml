name: Pipeline de Integracao Continua (CI)

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Checkout do codigo
      uses: actions/checkout@v3

    - name: 2. Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 3. Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Executar Testes Automatizados
      run: |
        pytest test_app.py

    - name: 5. Build da Imagem Docker
      run: |
        docker build -t minha-api-flask:latest .